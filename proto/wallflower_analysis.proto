syntax = "proto3";
package wallflower.analysis;

service AnalysisService {
  rpc AnalyzeJam(AnalyzeRequest) returns (stream AnalysisProgress);
  rpc SeparateStems(SeparateRequest) returns (stream SeparationProgress);
  rpc GetHealth(HealthRequest) returns (HealthResponse);
  rpc GetHardwareInfo(HardwareInfoRequest) returns (HardwareInfoResponse);
}

message AnalyzeRequest {
  string jam_id = 1;
  string audio_path = 2;
  AnalysisProfile profile = 3;
  repeated string skip_steps = 4;
}

enum AnalysisProfile {
  FULL = 0;
  STANDARD = 1;
  LIGHTWEIGHT = 2;
}

message AnalysisProgress {
  string jam_id = 1;
  AnalysisStep step = 2;
  StepStatus status = 3;
  oneof result {
    TempoResult tempo = 4;
    KeyResult key = 5;
    SectionsResult sections = 6;
    LoopsResult loops = 7;
  }
}

enum AnalysisStep {
  TEMPO = 0;
  KEY = 1;
  SECTIONS = 2;
  LOOPS = 3;
}

enum StepStatus {
  STARTED = 0;
  COMPLETED = 1;
  FAILED = 2;
  SKIPPED = 3;
}

message TempoResult {
  float bpm = 1;
  float confidence = 2;
  repeated BeatPosition beats = 3;
}

message BeatPosition {
  float time_seconds = 1;
}

message KeyResult {
  string key = 1;
  string scale = 2;
  float strength = 3;
}

message SectionsResult {
  repeated Section sections = 1;
}

message Section {
  float start_seconds = 1;
  float end_seconds = 2;
  string label = 3;
  int32 cluster_id = 4;
}

message LoopsResult {
  repeated Loop loops = 1;
}

message Loop {
  float start_seconds = 1;
  float end_seconds = 2;
  int32 repeat_count = 3;
  bool evolving = 4;
  string label = 5;
}

message SeparateRequest {
  string bookmark_id = 1;
  string audio_path = 2;
  float start_seconds = 3;
  float end_seconds = 4;
  string model_name = 5;       // "htdemucs" or "htdemucs_6s"
  float segment_seconds = 6;    // chunk size in seconds, default 10.0
  float overlap = 7;            // overlap ratio 0.0-1.0, default 0.25
  string output_dir = 8;        // directory to write stem WAV files
}

message SeparationProgress {
  string bookmark_id = 1;
  SeparationStatus status = 2;
  int32 current_chunk = 3;
  int32 total_chunks = 4;
  float percent_complete = 5;
  float estimated_seconds_remaining = 6;
  repeated StemFile stem_files = 7;
  string error_message = 8;
}

enum SeparationStatus {
  SEPARATING = 0;
  CHUNK_COMPLETE = 1;
  SEPARATION_COMPLETED = 2;
  SEPARATION_FAILED = 3;
  CANCELLED = 4;
  PAUSED = 5;
}

message StemFile {
  string stem_name = 1;
  string file_path = 2;
  int64 file_size_bytes = 3;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
}

message HardwareInfoRequest {}

message HardwareInfoResponse {
  string chip = 1;
  int32 cores = 2;
  int64 memory_bytes = 3;
  AnalysisProfile recommended_profile = 4;
}
